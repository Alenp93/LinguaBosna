<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="stylesheet" href="/Code/Style.css">
  <link rel="stylesheet" href="/Code/1_Startseite/Style_5_Kultur.css">
  <script src="/Code/LB_main.js" ></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaBosna – Kultur</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">

</head>
<body>

  <div id="header"></div>

  <!-- Main -->
  <main>
    <h1>Kultur entdecken</h1>
    <div class="culture-grid">
      <a href="#" class="culture-card">
        <img src="/Bilder/essen/pita2.jpg" alt="Bosnisches Essen">
        <div class="culture-overlay">Bosnisches Essen entdecken</div>
      </a>
      <a href="#" class="culture-card">
        <img src="/Bilder/musik/gitarre.jpg" alt="Bosnische Musik">
        <div class="culture-overlay">Musik & Instrumente</div>
      </a>
      <a href="#" class="culture-card">
        <img src="/Bilder/geschichte&literatur/literatur.jpg" alt="Geschichte">
        <div class="culture-overlay">Geschichte & Literatur</div>
      </a>
      <a href="#" class="culture-card">
        <img src="/Bilder/sehenswuerdigkeiten/mostar.jpg" alt="Sehenswürdigkeiten">
        <div class="culture-overlay">Sehenswürdigkeiten</div>
      </a>
    </div>
  </main>

  <div id="footer"></div>

</body>
</html>
