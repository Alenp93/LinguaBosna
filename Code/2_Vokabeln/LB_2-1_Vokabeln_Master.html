<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Dynamischer Titel & Description werden per JS gesetzt -->
  <meta name="description" content="Bosnische Vokabeln mit deutscher Übersetzung und Aussprache – für jedes Kapitel auf LinguaBosna.">
  <title>LinguaBosna – Vokabeln</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/Code/Style.css">
  <link rel="stylesheet" href="/Code/2_Vokabeln/Style_Vokabelnkategorien.css">

  <!-- Shared Header/Footer -->
  <script src="/Code/LB_main.js"></script>
</head>
<body>

  <!-- Header (dynamisch) -->
  <div id="header"></div>

  <main>

    <!-- Seitentitel-Block (wird per JS mit Kapitel-Daten befüllt) -->
    <div class="page-header">
      <h1 id="pageTitle">Vokabeln</h1>
      <p id="pageSubtitle" class="page-subtitle"></p>
    </div>

    <!-- Lade-/Fehlermeldung -->
    <p id="stateMsg" class="state-msg">
      <i class="fa-solid fa-spinner fa-spin"></i> Vokabeln werden geladen…
    </p>

    <!-- Aktionsleiste — erst nach erfolgreichem Laden sichtbar -->
    <!-- Button-System laut Designvorgabe: btn-outline und btn-primary -->
    <div class="actions" id="actions" style="display:none;">

      <!-- Zurück-Button: outline (sekundäre Aktion) -->
      <a href="/Code/2_Vokabeln/LB_2_Vokabeln.html" class="btn btn-outline">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Zurück zur Übersicht
      </a>

      <!-- Trainer-Button: primary (Hauptaktion) -->
      <a id="trainerLink" href="#" class="btn btn-primary">
        <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
        Zum Vokabeltrainer
      </a>

      <!-- Drucken-Button: outline (sekundäre Aktion) -->
      <button onclick="window.print()" class="btn btn-outline">
        <i class="fa-solid fa-print" aria-hidden="true"></i>
        Tabelle drucken
      </button>

    </div>

    <!-- Tabellen-Wrapper (mit Scrollbar auf Mobil) -->
    <div class="table-wrap">
      <table id="vocabTable" style="display:none;">
        <thead>
          <tr>
            <th>Bosnisch</th>
            <th>Deutsch</th>
            <th>Wortart</th>
          </tr>
        </thead>
        <tbody id="vocabBody"></tbody>
      </table>
    </div>

    <!-- Vokabelanzahl -->
    <div class="count" id="countWrap" style="display:none;">
      <i class="fa-solid fa-list-check" aria-hidden="true"></i>
      Anzahl der Vokabeln in diesem Kapitel: <strong id="vocabCount"></strong>
    </div>

  </main>

  <!-- Footer (dynamisch) -->
  <div id="footer"></div>

  <script>
    // ── Pfade ──────────────────────────────────────────────────────────
    const JSON_PATH    = '/Code/2_Vokabeln/vokabeln_flat.json';
    const TRAINER_PATH = '/Code/2_Vokabeln/vokabeltrainer.html';
    // ──────────────────────────────────────────────────────────────────

    // Liest Wortart aus — JSON hat zwei mögliche Feldnamen je Kapitel
    function getWortart(entry) {
      return entry['Wortart'] || entry['Wortart (Genus)'] || '';
    }

    // ── Beste verfügbare BKS-Stimme ermitteln ───────────────────────────
    // BKS = Bosnisch / Kroatisch / Serbisch (+ Montenegrinisch). Alle vier
    // klingen phonetisch praktisch gleich. Wir nehmen die erste Stimme, die
    // das Gerät tatsächlich anbietet – in dieser Wunschreihenfolge:
    // Bosnisch → Kroatisch → Serbisch → Montenegrinisch.
    const BKS_LANGS = ['bs-BA', 'bs', 'hr-HR', 'hr', 'sr-RS', 'sr', 'cnr-ME', 'cnr'];
    let bksVoice = null;

    function pickBksVoice() {
      const voices = window.speechSynthesis.getVoices();   // verfügbare Stimmen abfragen
      for (const lang of BKS_LANGS) {                       // Wunschreihenfolge durchgehen
        const treffer = voices.find(v =>
          v.lang && v.lang.toLowerCase().startsWith(lang.toLowerCase())
        );
        if (treffer) { bksVoice = treffer; break; }         // erste passende Stimme merken
      }
    }

    // Stimmen werden teils verzögert geladen – deshalb sofort UND beim
    // Nachladen ermitteln. Läuft beim Seitenstart (lange vor dem ersten
    // Klick) und blockiert daher nichts auf Mobilgeräten.
    if ('speechSynthesis' in window) {
      pickBksVoice();
      window.speechSynthesis.addEventListener('voiceschanged', pickBksVoice);
    }

    // ── Aussprache per Browser-Stimme (Web Speech API) ──────────────────
    // Erzeugt die Aussprache live im Browser – es werden KEINE Tondateien
    // benötigt.
    function speakWord(word) {
      // 1) Unterstützt der Browser Sprachausgabe überhaupt? (sehr ältere Browser nicht)
      if (!('speechSynthesis' in window)) return;

      // 2) Eventuell noch laufende Ausgabe stoppen – verhindert Überlappung,
      //    wenn schnell hintereinander auf mehrere Buttons getippt wird.
      window.speechSynthesis.cancel();

      // 3) Sprachobjekt mit dem ORIGINAL-Wort erstellen – wichtig: MIT den
      //    Sonderzeichen (č, ć, š, ž, đ), damit die Aussprache korrekt klingt.
      const utterance = new SpeechSynthesisUtterance(word);

      // 4) Gefundene BKS-Stimme verwenden; falls keine erkannt wurde,
      //    Kroatisch als sicherer Standard-Fallback (phonetisch ≈ Bosnisch).
      if (bksVoice) {
        utterance.voice = bksVoice;
        utterance.lang  = bksVoice.lang;
      } else {
        utterance.lang  = 'hr-HR';
      }

      // 5) Etwas langsamer als normal – angenehmer zum Mit- und Nachsprechen.
      utterance.rate = 0.9;

      // 6) Sofort & synchron abspielen. WICHTIG für Mobilgeräte: speak() muss
      //    direkt im Klick-Event aufgerufen werden. Jede Verzögerung
      //    (setTimeout o. Ä.) würde den Ton auf dem Handy blockieren.
      window.speechSynthesis.speak(utterance);
    }

    // Klicks auf ALLE Lautsprecher-Buttons zentral über die Tabelle abfangen
    // (sogenannte "Event-Delegation"). Vorteile gegenüber einem onclick pro Button:
    //  • funktioniert auch für Zeilen, die erst später dynamisch erzeugt werden
    //  • keine Escaping-Probleme mit Sonderzeichen/Apostrophen im Wort
    // Das gesuchte Wort steht jeweils im data-Attribut "data-wort" des Buttons.
    document.getElementById('vocabBody').addEventListener('click', (e) => {
      const btn = e.target.closest('.speaker-btn');  // wurde ein Lautsprecher getroffen?
      if (!btn) return;                               // Klick daneben → ignorieren
      speakWord(btn.dataset.wort);                    // Wort vorlesen lassen
    });

    async function loadVocab() {
      // Kapitel-Nummer aus der URL lesen (?kapitel=1)
      const params  = new URLSearchParams(window.location.search);
      const kapitel = parseInt(params.get('kapitel') || '1', 10);

      try {
        const res = await fetch(JSON_PATH);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const all = await res.json();

        // Nur die Einträge für das aktuelle Kapitel herausfiltern
        const entries = all.filter(e => e.Kapitel === kapitel);

        if (!entries.length) {
          const msg = document.getElementById('stateMsg');
          msg.innerHTML = `⚠️ Keine Vokabeln für Kapitel ${kapitel} gefunden.`;
          msg.style.color = '#b03030';
          return;
        }

        const kapitelname = entries[0].Kapitelname;

        // Seitentitel, Untertitel und Browser-Tab aktualisieren
        document.getElementById('pageTitle').textContent    = kapitelname;
        document.getElementById('pageSubtitle').textContent = `Kapitel ${kapitel} · ${entries.length} Vokabeln`;
        document.title = `LinguaBosna – Vokabeln: ${kapitelname}`;

        // Vokabeltrainer-Link mit passendem Kapitel-Parameter setzen
        document.getElementById('trainerLink').href = `${TRAINER_PATH}?kapitel=${kapitel}`;

        // Tabellenzeilen dynamisch erstellen
        const tbody = document.getElementById('vocabBody');
        tbody.innerHTML = '';

        entries.forEach(entry => {
          const tr = document.createElement('tr');
          // Hinweis: Das Wort wird im data-Attribut "data-wort" gespeichert –
          // MIT Sonderzeichen, damit speakWord() korrekt aussprechen kann.
          tr.innerHTML = `
            <td>
              ${entry.Bosnisch}
              <button
                class="speaker-btn"
                data-wort="${entry.Bosnisch}"
                title="Aussprache anhören"
                aria-label="Aussprache von ${entry.Bosnisch}">
                <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
              </button>
            </td>
            <td>${entry.Deutsch}</td>
            <td><span class="wortart-badge">${getWortart(entry)}</span></td>
          `;
          tbody.appendChild(tr);
        });

        // Anzahl setzen
        document.getElementById('vocabCount').textContent = entries.length;

        // Alle UI-Elemente einblenden
        document.getElementById('stateMsg').style.display   = 'none';
        document.getElementById('actions').style.display    = 'flex';  /* flex für Button-Reihe */
        document.getElementById('vocabTable').style.display = '';
        document.getElementById('countWrap').style.display  = '';

      } catch (e) {
        const msg = document.getElementById('stateMsg');
        msg.innerHTML = '⚠️ Vokabeln konnten nicht geladen werden. Bitte prüfe den JSON-Pfad.';
        msg.style.color = '#b03030';
      }
    }

    loadVocab();
  </script>

</body>
</html>
