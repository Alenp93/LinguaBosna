<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lerne bosnische Vokabeln von A1 bis C2 – über 70 thematische Kapitel mit interaktivem Vokabeltrainer, sortiert nach Sprachniveau.">
  <title>LinguaBosna – Vokabeln</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ── Favicon (LinguaBosna-Logo) ───────────────────────────── -->
  <link rel="icon" type="image/png" href="/Bilder/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/Bilder/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/Bilder/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/Bilder/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="LinguaBosna" />
  <link rel="manifest" href="/Bilder/favicon/site.webmanifest" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/Code/Style.css">
  <link rel="stylesheet" href="/Code/2_Vokabeln/Style_2_Vokabeln.css">

  <!-- Shared Header/Footer JS -->
  <script src="/Code/LB_main.js"></script>
</head>
<body>

  <!-- Header (dynamisch eingebunden per LB_main.js) -->
  <div id="header"></div>

  <main>

    <!-- Section-Intro Block (Designvorgabe: jede Section verwendet diesen Block) -->
    <div class="section-intro">
      <h1>Vokabeln</h1>
      <p>Wähle dein Sprachniveau und starte deine Lerneinheit</p>
    </div>

    <!-- ── Niveau-Auswahl (Tab-Buttons) ──────────────────────────
         Wird per JS mit den tatsächlich vorhandenen Niveaus befüllt. -->
    <div class="level-selector" id="levelSelector" role="tablist" aria-label="Sprachniveau auswählen"></div>

    <!-- Lade-Meldung (wird per JS ausgeblendet) -->
    <p id="loadingMsg" class="loading-msg">
      <i class="fa-solid fa-spinner fa-spin"></i> Kategorien werden geladen…
    </p>

    <!-- Container für die Karten-Grids je Niveau (komplett per JS befüllt) -->
    <div id="levelGrids"></div>

  </main>

  <!-- Footer (dynamisch eingebunden per LB_main.js) -->
  <div id="footer"></div>

  <script>
    // ── Pfade ────────────────────────────────────────────────────────
    const JSON_PATH   = "/Code/2_Vokabeln/vokabeln_flat.json";
    const MASTER_PAGE = '/Code/2_Vokabeln/LB_2-1_Vokabeln_Master.html';
    // ────────────────────────────────────────────────────────────────

    // Feste Reihenfolge & Beschriftung der Niveaus (wie auf der Grammatikseite)
    const LEVEL_ORDER  = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
    const LEVEL_LABELS = {
      'A1': 'A1 – Grundlagen',
      'A2': 'A2 – Aufbau',
      'B1': 'B1 – Mittelstufe',
      'B2': 'B2 – Fortgeschritten',
      'C1': 'C1 – Oberstufe',
      'C2': 'C2 – Profi'
    };

    // ── Themen-Icons ────────────────────────────────────────────────
    // Statt fester Kapitelnummern wird das Icon anhand von Stichwörtern im
    // Kapitelnamen gewählt. Das bleibt auch dann korrekt, wenn sich
    // Kapitelnummern künftig verschieben oder neue Kapitel dazukommen.
    // Die Reihenfolge ist wichtig: spezifischere Begriffe stehen oben.
    const ICON_RULES = [
      [/begrüßung|alltagssprache/i,            'fa-comments'],
      [/routine/i,                             'fa-arrows-rotate'],
      [/zahlen|mengen/i,                       'fa-hashtag'],
      [/farben|formen/i,                       'fa-palette'],
      [/körper/i,                              'fa-person'],
      [/familie|freunde/i,                     'fa-people-group'],
      [/verben|handlungen/i,                   'fa-person-running'],
      [/essen|trinken/i,                       'fa-utensils'],
      [/\bzeit\b|datum/i,                      'fa-calendar-days'],
      [/haus|wohnen/i,                         'fa-house'],
      [/kleidung|aussehen/i,                   'fa-shirt'],
      [/tiere/i,                               'fa-paw'],
      [/wetter/i,                              'fa-cloud-sun'],
      [/natur|länder/i,                        'fa-earth-europe'],
      [/reisen|verkehr/i,                      'fa-plane'],
      [/stadt|wegbeschreibung/i,               'fa-map-location-dot'],
      [/einkaufen/i,                           'fa-cart-shopping'],
      [/hobbys|freizeit/i,                     'fa-futbol'],
      [/berufe|arbeit|karriere/i,              'fa-briefcase'],
      [/schule/i,                              'fa-school'],
      [/literatur/i,                           'fa-book-open'],
      [/studium|bildung/i,                     'fa-graduation-cap'],
      [/technik|internet/i,                    'fa-microchip'],
      [/medizin/i,                             'fa-stethoscope'],
      [/symptome/i,                            'fa-notes-medical'],
      [/gesundheit/i,                          'fa-heart-pulse'],
      [/persönlichkeit/i,                      'fa-fingerprint'],
      [/beziehungen/i,                         'fa-heart'],
      [/gefühle|emotion|haltung|charakter/i,   'fa-face-smile'],
      [/kommunikation/i,                       'fa-tower-broadcast'],
      [/öffentlichkeit/i,                      'fa-tv'],
      [/medien/i,                              'fa-newspaper'],
      [/meinung|diskussion/i,                  'fa-comment-dots'],
      [/konnektoren/i,                         'fa-link'],
      [/redemittel/i,                          'fa-comment-dots'],
      [/redewendungen|idiome|idiomatik/i,      'fa-quote-right'],
      [/orientalizmi|kulturlexik/i,            'fa-star-and-crescent'],
      [/sevdah|kulturerbe/i,                   'fa-music'],
      [/gesellschaft|soziales/i,               'fa-people-roof'],
      [/kultur/i,                              'fa-masks-theater'],
      [/politik|staat/i,                       'fa-landmark-dome'],
      [/umwelt|klima/i,                        'fa-leaf'],
      [/wirtschaft|finanzen/i,                 'fa-chart-line'],
      [/geld/i,                                'fa-money-bill-wave'],
      [/wissenschaft|forschung/i,              'fa-flask'],
      [/synonyme|nuancen/i,                    'fa-arrow-right-arrow-left'],
      [/gehobene|lexik/i,                      'fa-feather-pointed'],
      [/abstrakte|konzepte|begriffe/i,         'fa-lightbulb'],
      [/kollokationen|wendungen/i,             'fa-puzzle-piece'],
      [/formell/i,                             'fa-file-signature'],
      [/behörden/i,                            'fa-landmark'],
      [/justiz|verwaltung|recht|gericht/i,     'fa-gavel'],
      [/umgangssprache|bosnizismen/i,          'fa-comment'],
      [/sprichwörter|sprichwort/i,             'fa-quote-left'],
      [/archaismen|feierliche/i,               'fa-scroll'],
      [/regionalismen|dialekt|partikeln/i,     'fa-language']
    ];

    function iconFor(name) {
      for (const [regex, icon] of ICON_RULES) {
        if (regex.test(name)) return 'fa-solid ' + icon;
      }
      return 'fa-solid fa-book';   // Fallback
    }

    // ── Tab-Logik: nur das gewählte Niveau anzeigen ─────────────────
    function showLevel(level) {
      document.querySelectorAll('#levelGrids .vocab-grid').forEach(grid => {
        grid.classList.toggle('hidden', grid.dataset.level !== level);
      });
      document.querySelectorAll('.level-btn').forEach(btn => {
        const aktiv = btn.dataset.level === level;
        btn.classList.toggle('active', aktiv);
        btn.setAttribute('aria-selected', aktiv ? 'true' : 'false');
      });
    }

    async function loadCategories() {
      try {
        const res = await fetch(JSON_PATH);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Gruppieren: Niveau → Kapitel → { name, count }
        // (Reihenfolge der Kapitel ergibt sich aus dem ersten Auftreten.)
        const byLevel = new Map();
        data.forEach(entry => {
          const niv = entry.Niveau;
          if (!byLevel.has(niv)) byLevel.set(niv, new Map());
          const kaps = byLevel.get(niv);
          if (!kaps.has(entry.Kapitel)) {
            kaps.set(entry.Kapitel, {
              kapitel:     entry.Kapitel,
              kapitelname: entry.Kapitelname,
              count:       0
            });
          }
          kaps.get(entry.Kapitel).count++;
        });

        // Nur tatsächlich vorhandene Niveaus, in fester Reihenfolge
        const levels = LEVEL_ORDER.filter(l => byLevel.has(l));

        // 1) Tab-Buttons bauen
        const selector = document.getElementById('levelSelector');
        selector.innerHTML = '';
        levels.forEach((lvl, i) => {
          const btn = document.createElement('button');
          btn.className = 'level-btn' + (i === 0 ? ' active' : '');
          btn.dataset.level = lvl;
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
          btn.textContent = LEVEL_LABELS[lvl] || lvl;
          btn.addEventListener('click', () => showLevel(lvl));
          selector.appendChild(btn);
        });

        // 2) Karten-Grids je Niveau bauen (erstes sichtbar, Rest versteckt)
        const gridsWrap = document.getElementById('levelGrids');
        gridsWrap.innerHTML = '';
        levels.forEach((lvl, i) => {
          const grid = document.createElement('div');
          grid.className = 'vocab-grid' + (i === 0 ? '' : ' hidden');
          grid.dataset.level = lvl;

          byLevel.get(lvl).forEach(({ kapitel, kapitelname, count }) => {
            const a = document.createElement('a');
            a.href      = `${MASTER_PAGE}?kapitel=${kapitel}`;
            a.className = 'vocab-card';
            a.setAttribute('aria-label', `Kapitel ${kapitel}: ${kapitelname}`);
            a.innerHTML = `
              <div class="vocab-card-icon">
                <i class="${iconFor(kapitelname)}" aria-hidden="true"></i>
              </div>
              <div class="vocab-card-num">Kapitel ${kapitel}</div>
              <h2 class="vocab-card-title">${kapitelname}</h2>
              <div class="vocab-card-count">${count} Vokabeln</div>
            `;
            grid.appendChild(a);
          });

          gridsWrap.appendChild(grid);
        });

        // Lade-Meldung ausblenden
        document.getElementById('loadingMsg').style.display = 'none';

      } catch (e) {
        const msg = document.getElementById('loadingMsg');
        msg.innerHTML = '⚠️ Kategorien konnten nicht geladen werden. Bitte prüfe den JSON-Pfad.';
        msg.style.color = '#b03030';
      }
    }

    loadCategories();
  </script>

</body>
</html>
