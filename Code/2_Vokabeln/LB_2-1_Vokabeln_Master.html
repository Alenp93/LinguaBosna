<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Dynamischer Titel & Description werden per JS gesetzt -->
  <meta name="description" content="Bosnische Vokabeln mit deutscher Übersetzung und Aussprache – für jedes Kapitel auf LinguaBosna.">
  <title>LinguaBosna – Vokabeln</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/Code/Style.css">
  <link rel="stylesheet" href="/Code/2_Vokabeln/Style_Vokabelnkategorien.css">

  <!-- Shared Header/Footer -->
  <script src="/Code/LB_main.js"></script>
</head>
<body>

  <!-- Header (dynamisch) -->
  <div id="header"></div>

  <main>

    <!-- Seitentitel-Block (wird per JS mit Kapitel-Daten befüllt) -->
    <div class="page-header">
      <h1 id="pageTitle">Vokabeln</h1>
      <p id="pageSubtitle" class="page-subtitle"></p>
    </div>

    <!-- Lade-/Fehlermeldung -->
    <p id="stateMsg" class="state-msg">
      <i class="fa-solid fa-spinner fa-spin"></i> Vokabeln werden geladen…
    </p>

    <!-- Aktionsleiste — erst nach erfolgreichem Laden sichtbar -->
    <!-- Button-System laut Designvorgabe: btn-outline und btn-primary -->
    <div class="actions" id="actions" style="display:none;">

      <!-- Zurück-Button: outline (sekundäre Aktion) -->
      <a href="/Code/2_Vokabeln/LB_2_Vokabeln.html" class="btn btn-outline">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Zurück zur Übersicht
      </a>

      <!-- Trainer-Button: primary (Hauptaktion) -->
      <a id="trainerLink" href="#" class="btn btn-primary">
        <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
        Zum Vokabeltrainer
      </a>

      <!-- Drucken-Button: outline (sekundäre Aktion) -->
      <button onclick="window.print()" class="btn btn-outline">
        <i class="fa-solid fa-print" aria-hidden="true"></i>
        Tabelle drucken
      </button>

    </div>

    <!-- Tabellen-Wrapper (mit Scrollbar auf Mobil) -->
    <div class="table-wrap">
      <table id="vocabTable" style="display:none;">
        <thead>
          <tr>
            <th>Bosnisch</th>
            <th>Deutsch</th>
            <th>Wortart</th>
          </tr>
        </thead>
        <tbody id="vocabBody"></tbody>
      </table>
    </div>

    <!-- Vokabelanzahl -->
    <div class="count" id="countWrap" style="display:none;">
      <i class="fa-solid fa-list-check" aria-hidden="true"></i>
      Anzahl der Vokabeln in diesem Kapitel: <strong id="vocabCount"></strong>
    </div>

  </main>

  <!-- Footer (dynamisch) -->
  <div id="footer"></div>

  <script>
    // ── Pfade ──────────────────────────────────────────────────────────
    const JSON_PATH    = '/Code/2_Vokabeln/vokabeln_flat.json';
    const TRAINER_PATH = '/Code/2_Vokabeln/vokabeltrainer.html';
    // ──────────────────────────────────────────────────────────────────

    // Liest Wortart aus — JSON hat zwei mögliche Feldnamen je Kapitel
    function getWortart(entry) {
      return entry['Wortart'] || entry['Wortart (Genus)'] || '';
    }

    // Audio abspielen — MP3-Dateien müssen im Ordner "audio/" vorhanden sein
    function playAudio(word) {
      const audio = new Audio('audio/' + word + '.mp3');
      audio.play().catch(() => { /* Datei noch nicht vorhanden — kein Fehler anzeigen */ });
    }

    // Bosnisches Wort → URL-sicherer Datei-Schlüssel für MP3-Pfade
    function toAudioKey(word) {
      return word
        .toLowerCase()
        .replace(/č/g, 'c').replace(/ć/g, 'c')
        .replace(/š/g, 's').replace(/ž/g, 'z')
        .replace(/đ/g, 'dj').replace(/ð/g, 'dj')
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-]/g, '');
    }

    async function loadVocab() {
      // Kapitel-Nummer aus der URL lesen (?kapitel=1)
      const params  = new URLSearchParams(window.location.search);
      const kapitel = parseInt(params.get('kapitel') || '1', 10);

      try {
        const res = await fetch(JSON_PATH);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const all = await res.json();

        // Nur die Einträge für das aktuelle Kapitel herausfiltern
        const entries = all.filter(e => e.Kapitel === kapitel);

        if (!entries.length) {
          const msg = document.getElementById('stateMsg');
          msg.innerHTML = `⚠️ Keine Vokabeln für Kapitel ${kapitel} gefunden.`;
          msg.style.color = '#b03030';
          return;
        }

        const kapitelname = entries[0].Kapitelname;

        // Seitentitel, Untertitel und Browser-Tab aktualisieren
        document.getElementById('pageTitle').textContent    = kapitelname;
        document.getElementById('pageSubtitle').textContent = `Kapitel ${kapitel} · ${entries.length} Vokabeln`;
        document.title = `LinguaBosna – Vokabeln: ${kapitelname}`;

        // Vokabeltrainer-Link mit passendem Kapitel-Parameter setzen
        document.getElementById('trainerLink').href = `${TRAINER_PATH}?kapitel=${kapitel}`;

        // Tabellenzeilen dynamisch erstellen
        const tbody = document.getElementById('vocabBody');
        tbody.innerHTML = '';

        entries.forEach(entry => {
          const audioKey = toAudioKey(entry.Bosnisch);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              ${entry.Bosnisch}
              <button
                class="speaker-btn"
                onclick="playAudio('${audioKey}')"
                title="Aussprache anhören"
                aria-label="Aussprache von ${entry.Bosnisch}">
                <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
              </button>
            </td>
            <td>${entry.Deutsch}</td>
            <td><span class="wortart-badge">${getWortart(entry)}</span></td>
          `;
          tbody.appendChild(tr);
        });

        // Anzahl setzen
        document.getElementById('vocabCount').textContent = entries.length;

        // Alle UI-Elemente einblenden
        document.getElementById('stateMsg').style.display   = 'none';
        document.getElementById('actions').style.display    = 'flex';  /* flex für Button-Reihe */
        document.getElementById('vocabTable').style.display = '';
        document.getElementById('countWrap').style.display  = '';

      } catch (e) {
        const msg = document.getElementById('stateMsg');
        msg.innerHTML = '⚠️ Vokabeln konnten nicht geladen werden. Bitte prüfe den JSON-Pfad.';
        msg.style.color = '#b03030';
      }
    }

    loadVocab();
  </script>

</body>
</html>
